# GitHub に push するには PAT の workflow 権限が必要な環境があるため、
# このファイルはサンプルです。有効にするときはコピーして:
#   .github/workflows/ci.yml
# として保存し、commit & push してください。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
